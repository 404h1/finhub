{% extends 'base.html' %}
{% block title %}비밀번호 변경{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2 style="font-size:24px;font-weight:800;margin-bottom:4px;">비밀번호 변경</h2>
    <p style="color:var(--text-3);font-size:14px;margin-bottom:28px;">새로운 비밀번호를 설정하세요</p>
    <form method="POST" class="form-fh">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger mt-1" style="font-size:12px;">{{ field.errors|join:", " }}</div>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn-primary-fh w-100" style="padding:13px;font-size:15px;justify-content:center;">변경하기</button>
    </form>
    <div class="text-center mt-3"><a href="/accounts/profile/" class="btn-ghost-fh" style="font-size:13px;">취소</a></div>
  </div>
</div>
{% endblock %}
