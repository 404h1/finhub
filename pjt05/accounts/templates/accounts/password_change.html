{% extends "community/base.html" %}
{% block title %}비밀번호 변경 | 금융 자산 커뮤니티{% endblock %}
{% block content %}
<h2 class="page-title">비밀번호 변경</h2>
<form method="post" style="max-width:400px;margin-top:1.5rem;">
  {% csrf_token %}
  {% for field in form %}
  <div class="form-group">
    <label>{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
  </div>
  {% endfor %}
  <div class="btn-group" style="margin-top:1.5rem;">
    <button type="submit" class="btn">변경하기</button>
    <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">취소</a>
  </div>
</form>
{% endblock %}
