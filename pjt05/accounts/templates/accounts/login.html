{% extends "community/base.html" %}
{% block title %}로그인 | 금융 자산 커뮤니티{% endblock %}
{% block content %}
<h2 class="page-title">로그인</h2>
<form method="post" style="max-width:400px;margin-top:1.5rem;">
  {% csrf_token %}
  <div class="form-group">
    <label>아이디</label>
    {{ form.username }}
  </div>
  <div class="form-group">
    <label>비밀번호</label>
    {{ form.password }}
  </div>
  {% if form.non_field_errors %}
  <p style="color:var(--color-danger);font-size:.875rem;margin-bottom:1rem;">
    아이디 또는 비밀번호가 올바르지 않습니다.
  </p>
  {% endif %}
  <div class="btn-group" style="margin-top:1.5rem;">
    <button type="submit" class="btn">로그인</button>
    <a href="{% url 'accounts:signup' %}" class="btn btn-secondary">회원가입</a>
  </div>
</form>
{% endblock %}
